<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>清除缓存 - 智律小管家</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 { font-size: 28px; margin: 0 0 20px; }
        .status {
            margin: 30px 0;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            font-size: 15px;
            text-align: left;
        }
        .status-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .status-item:last-child { border-bottom: none; }
        .status-item.ok { color: #a8ff60; }
        .status-item.pending { color: #ffd166; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .btn.primary { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; }
        .tip { margin-top: 20px; font-size: 13px; opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 缓存清理工具</h1>
        <div style="font-size:15px; opacity:0.9;">正在清理旧缓存...</div>
        <div class="status" id="status"></div>
        <button class="btn primary" onclick="goHome()">打开最新版应用</button>
        <div class="tip">
            清理完成后请点击按钮打开应用<br>
            版本号：2026062012</div>
    </div>

    <script>
        (function () {
            const statusEl = document.getElementById('status');
            let count = 0;

            function log(msg, ok) {
                count++;
                const item = document.createElement('div');
                item.className = 'status-item ' + (ok ? 'ok' : 'pending');
                item.textContent = (ok ? '✅ ' : '⏳ ') + msg;
                statusEl.appendChild(item);
            }

            // 1. 清除 localStorage 所有缓存
            log('清除本地数据...');
            try {
                localStorage.clear();
                log('本地数据已清除', true);
            } catch (e) { log('本地数据清除失败: ' + e.message, false); }

            // 2. 清除所有缓存 Storage
            log('清除浏览器缓存...');
            try {
                if (window.caches) {
                    caches.keys().then(names => {
                        names.forEach(name => {
                            caches.delete(name);
                        });
                        log('缓存名称: ' + names.length + ' 个已清除', true);
                    });
                }
            } catch (e) { log('清除失败: ' + e.message, false); }

            // 3. 清除 IndexedDB
            log('清除数据库...');
            try {
                if (window.indexedDB) {
                    indexedDB.databases().then(dbs => {
                        dbs.forEach(db => {
                            indexedDB.deleteDatabase(db.name);
                        });
                        log('数据库: ' + dbs.length + ' 个已清除', true);
                    });
                }
            } catch (e) { log('清除数据库失败: ' + e.message, false); }

            // 4. 清除 Service Worker
            log('清除后台服务...');
            try {
                if (navigator.serviceWorker) {
                    navigator.serviceWorker.getRegistrations().then(regs => {
                        regs.forEach(reg => reg.unregister());
                        log('服务: ' + regs.length + ' 个已清除', true);
                    });
                }
            } catch (e) { log('清除服务失败: ' + e.message, false); }

            // 5. 设置标志，表示清除完成
            setTimeout(() => {
                const done = document.createElement('div');
                done.className = 'status-item ok';
                done.innerHTML = '<strong>🎉 缓存全部清除完成！</strong>';
                statusEl.appendChild(done);
                localStorage.setItem('zhilv_cleared', '1');
            }, 500);

            // 6. 自动跳转到主页面
            setTimeout(() => {
                window.location.href = './index.html?v=2026062012&_t=' + Date.now();
            }, 2500);
        })();

        function goHome() {
            window.location.href = './index.html?v=2026062012&_t=' + Date.now();
        }
    </script>
</body>
</html>
