<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>关于 - 智律小管家</title>
    <style>
        body {
            margin: 0;
            padding: 30px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px;
            color: #fff;
        }
        .version {
            font-size: 14px;
            color: #a0a0c0;
            margin-bottom: 30px;
        }
        .desc {
            font-size: 14px;
            line-height: 1.8;
            color: #c0c0d0;
            margin-bottom: 30px;
        }
        .info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            font-size: 13px;
            color: #b0b0c8;
            line-height: 2;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
        }
        .info-label {
            color: #8080a0;
        }
        .copyright {
            margin-top: 25px;
            font-size: 12px;
            color: #707088;
        }
        .close-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .close-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📅</div>
        <h1>智律小管家</h1>
        <div class="version">版本 v1.0.0</div>
        <p class="desc">
            个人作息与生活管理应用<br>
            帮助您科学规划每一天
        </p>
        <div class="info">
            <div class="info-row">
                <span class="info-label">应用名称：</span>
                <span>智律小管家</span>
            </div>
            <div class="info-row">
                <span class="info-label">版本号：</span>
                <span>v1.0.0</span>
            </div>
            <div class="info-row">
                <span class="info-label">开发框架：</span>
                <span>Electron</span>
            </div>
            <div class="info-row">
                <span class="info-label">发布年份：</span>
                <span>2025</span>
            </div>
        </div>
        <div class="copyright">Copyright © 2025 智律小管家. All Rights Reserved.</div>
        <button class="close-btn" onclick="window.close()">关闭</button>
    </div>
</body>
</html>
